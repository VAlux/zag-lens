name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy --component rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked --workspace --exclude zag-lens-plugin
      - name: Test plugin host-side logic
        run: cargo test --locked -p zag-lens-plugin --bin zag_lens_plugin

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust and WASI target
        run: rustup toolchain install 1.94.1 --profile minimal --target wasm32-wasip1
      - name: Check plugin
        run: cargo check --locked -p zag-lens-plugin --target wasm32-wasip1
